name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    environment: Android
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Resolve release version from repository
        id: version
        shell: bash
        run: |
          set -euo pipefail

          VERSION_FILE="app/version.properties"
          VERSION_NAME="$(grep '^VERSION_NAME=' "${VERSION_FILE}" | cut -d'=' -f2-)"
          VERSION_CODE="$(grep '^VERSION_CODE=' "${VERSION_FILE}" | cut -d'=' -f2-)"

          if [[ -z "${VERSION_NAME}" || -z "${VERSION_CODE}" ]]; then
            echo "Failed to resolve VERSION_NAME or VERSION_CODE from ${VERSION_FILE}." >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            EXPECTED_TAG="v${VERSION_NAME}"
            if [[ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]]; then
              echo "Tag ${GITHUB_REF_NAME} does not match ${EXPECTED_TAG} from ${VERSION_FILE}." >&2
              exit 1
            fi
          fi

          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"

      - name: Restore signing keystore
        shell: bash
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail

          if [[ -z "${RELEASE_KEYSTORE_BASE64}" ]]; then
            echo "Missing RELEASE_KEYSTORE_BASE64 secret." >&2
            exit 1
          fi

          echo "${RELEASE_KEYSTORE_BASE64}" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release artifacts
        shell: bash
        env:
          SEENOT_VERSION_NAME: ${{ steps.version.outputs.version_name }}
          SEENOT_VERSION_CODE: ${{ steps.version.outputs.version_code }}
          RELEASE_STORE_FILE: ${{ runner.temp }}/release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${RELEASE_STORE_PASSWORD}" || -z "${RELEASE_KEY_ALIAS}" || -z "${RELEASE_KEY_PASSWORD}" ]]; then
            echo "Missing one or more signing secrets." >&2
            exit 1
          fi

          bundle exec fastlane android ci_release \
            version_name:"${SEENOT_VERSION_NAME}" \
            version_code:"${SEENOT_VERSION_CODE}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: seenot-${{ steps.version.outputs.version_name }}-release
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
