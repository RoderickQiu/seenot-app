name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version_name:
        description: "Release version name, e.g. 1.2.3"
        required: false
        type: string
      version_code:
        description: "Android versionCode override. Defaults to GitHub run number."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    environment: Android
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            VERSION_NAME="${GITHUB_REF_NAME#v}"
          else
            VERSION_NAME="${{ inputs.version_name }}"
          fi

          if [[ -z "${VERSION_NAME}" ]]; then
            echo "version_name is required for workflow_dispatch." >&2
            exit 1
          fi

          VERSION_CODE="${{ inputs.version_code }}"
          if [[ -z "${VERSION_CODE}" ]]; then
            VERSION_CODE="${GITHUB_RUN_NUMBER}"
          fi

          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"

      - name: Restore signing keystore
        shell: bash
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail

          if [[ -z "${RELEASE_KEYSTORE_BASE64}" ]]; then
            echo "Missing RELEASE_KEYSTORE_BASE64 secret." >&2
            exit 1
          fi

          echo "${RELEASE_KEYSTORE_BASE64}" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release artifacts
        shell: bash
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${RELEASE_STORE_PASSWORD}" || -z "${RELEASE_KEY_ALIAS}" || -z "${RELEASE_KEY_PASSWORD}" ]]; then
            echo "Missing one or more signing secrets." >&2
            exit 1
          fi

          chmod +x ./gradlew

          ./gradlew \
            :app:testReleaseUnitTest \
            :app:assembleRelease \
            :app:bundleRelease \
            -PSEENOT_VERSION_NAME="${{ steps.version.outputs.version_name }}" \
            -PSEENOT_VERSION_CODE="${{ steps.version.outputs.version_code }}" \
            -PRELEASE_STORE_FILE="$RUNNER_TEMP/release.keystore" \
            -PRELEASE_STORE_PASSWORD="${RELEASE_STORE_PASSWORD}" \
            -PRELEASE_KEY_ALIAS="${RELEASE_KEY_ALIAS}" \
            -PRELEASE_KEY_PASSWORD="${RELEASE_KEY_PASSWORD}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: seenot-${{ steps.version.outputs.version_name }}-release
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
